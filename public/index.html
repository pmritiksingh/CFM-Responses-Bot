<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Survey Auto-Filler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 2rem; }
    label { font-weight: 600; }
    input { padding: 8px; font-size: 14px; }
    button { padding: 10px 14px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Survey Auto-Filler</h2>

  <label>Survey Link:</label><br>
  <input id="url" style="width:420px" placeholder="Paste survey link"><br><br>

  <label>Number of Responses:</label><br>
  <input id="count" type="number" value="20" min="1"><br><br>

  <button onclick="startRun()">Start</button>

  <script>
    async function startRun() {
      const url = document.getElementById('url').value.trim();
      const count = document.getElementById('count').value;
      if (!url) { alert('Please paste a survey link'); return; }
      try {
        const res = await fetch(`/api/run?url=${encodeURIComponent(url)}&count=${encodeURIComponent(count)}`);
        const txt = await res.text();
        alert(txt);
      } catch (e) {
        alert('Run failed: ' + e.message);
      }
    }
  </script>
</body>
</html>
